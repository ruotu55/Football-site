<div class="panel-header">
  <h1>Quiz controls</h1>
  <button type="button" class="panel-toggle" id="panel-toggle" aria-expanded="true">Hide</button>
</div>

<div class="panel-tabs">
  <button type="button" class="tab-btn active" id="tab-btn-landing">Quiz</button>
  <button type="button" class="tab-btn" id="tab-btn-setup">Look</button>
  <button type="button" class="tab-btn" id="tab-btn-voice">Voice</button>
  <button type="button" class="tab-btn" id="tab-btn-saved">Saved</button>
</div>

<div id="panel-landing" class="panel-section active">
  <div class="field" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);">
    <span class="label" style="margin: 0;">Language</span>
    <div class="language-yn-group" style="display: flex; gap: 0.4rem;">
      <button type="button" class="specific-title-yn-btn yn-yes" id="lang-english" aria-pressed="true">English</button>
      <button type="button" class="specific-title-yn-btn yn-no" id="lang-spanish" aria-pressed="false">Español</button>
    </div>
  </div>

  <label class="field" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;">
    <span class="label" style="margin: 0;">Screen size</span>
    <input type="checkbox" id="in-screen-size-toggle" style="width: 1.2rem; height: 1.2rem; margin: 0; cursor: pointer; accent-color: var(--accent);" checked />
  </label>

  <label class="field" style="display:none">
    <span class="label">Quiz type</span>
    <select id="in-quiz-type">
      <option value="player-by-career" selected>Guess the football player by career path</option>
    </select>
  </label>

  <label class="field">
    <span class="label">Ending type</span>
    <select id="in-ending-type">
      <option value="random" selected>RANDOM</option>
      <option value="think-you-know">THINK YOU KNOW THE ANSWER?</option>
      <option value="how-many">HOW MANY DID YOU GET?</option>
    </select>
  </label>

  <label class="field">
    <span class="label">Total Levels</span>
    <div style="display: flex; gap: 0.5rem;">
      <input type="number" id="quiz-levels-input" value="30" min="1" max="100" style="flex: 1;" />
      <button type="button" id="update-levels-btn" class="panel-toggle">Apply</button>
    </div>
  </label>

  <button type="button" id="btn-levels-control" class="panel-toggle" style="width: 100%; margin-top: 0.5rem; background: rgba(255,255,255,0.05); color: var(--accent); font-weight: 800; border: 1px dashed var(--accent);">Levels Control</button>
  <div id="levels-reorder-list" style="display: none; flex-direction: column; gap: 0.4rem; margin-top: 0.8rem; padding: 0.6rem; background: rgba(0,0,0,0.3); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); max-height: 25rem; overflow-y: auto;"></div>

  <button
    type="button"
    id="btn-update-data"
    class="panel-toggle"
    style="width: 100%; margin-top: 0.8rem; font-weight: 800; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px dashed var(--accent);"
  >
    Update Data
  </button>

  <button
    type="button"
    id="btn-youtube-thumbnails"
    class="panel-toggle btn-youtube-thumbnails"
    aria-pressed="false"
    style="width: 100%; margin-top: 0.8rem; font-weight: 800;"
  >
    YouTube thumbnails
  </button>

  <button
    type="button"
    id="btn-name-description"
    class="panel-toggle btn-name-description"
    style="width: 100%; margin-top: 0.6rem; font-weight: 800; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px dashed var(--accent);"
  >
    Name &amp; Description
  </button>

  <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <input type="number" id="in-easy" value="10" min="0" />
    <input type="number" id="in-medium" value="5" min="0" />
    <input type="number" id="in-hard" value="3" min="0" />
    <input type="number" id="in-impossible" value="1" min="0" />
  </div>
</div>
<div id="panel-setup" class="panel-section">
  <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <select id="search-mode"><option value="team" selected>team</option></select>
    <select id="squad-type"><option value="club" selected>club</option><option value="national">national</option></select>
    <select id="formation"><option value="3421" selected>3421</option></select>
    <select id="display-mode"><option value="club" selected>club</option></select>
    <input type="search" id="team-search" value="" />
    <div id="team-results"></div>
  </div>
  <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <input type="checkbox" id="video-mode-toggle" />
    <input type="checkbox" id="shorts-mode-toggle" disabled />
  </div>
  <button type="button" id="apply-video-all-btn" class="panel-toggle" style="display:none; padding: 0.3rem 0.6rem; font-size: 0.8rem;">Apply Video Mode To All</button>

  <details class="voice-tab-section" open>
    <summary class="voice-tab-section__title">Background</summary>
    <label class="field">
      <span class="label">Background Color</span>
      <select id="in-background-color"></select>
    </label>
    <label class="field">
      <span class="label">Background Effect</span>
      <select id="in-background-effect"></select>
    </label>
    <label class="field">
      <span class="label">Opacity</span>
      <input type="number" id="in-background-opacity" value="3.5" min="0" max="10" step="0.1" />
    </label>

    <div id="setup-career-silhouette-field" style="display: none; flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 0.5rem;">
      <span class="label" style="margin: 0; font-size: 0.8rem;">Background Silhouette</span>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <button type="button" id="btn-silhouette-prev" class="panel-toggle" style="padding: 0.2rem 0.6rem;">&lt;</button>
        <span id="silhouette-indicator" style="font-weight: bold; font-size: 0.8rem; width: 1.5rem; text-align: center;">1</span>
        <button type="button" id="btn-silhouette-next" class="panel-toggle" style="padding: 0.2rem 0.6rem;">&gt;</button>
      </div>
    </div>
  </details>

  <details class="voice-tab-section" open>
    <summary class="voice-tab-section__title">Transition</summary>
    <button type="button" id="btn-transitions-control" class="panel-toggle" style="display: none; width: 100%; margin-top: 0.5rem; background: rgba(0,0,0,0.2); color: var(--accent); font-weight: 800; border: 1px dashed var(--accent);">Transitions</button>
    <div id="transitions-settings" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.4rem; padding: 0.6rem; background: rgba(0,0,0,0.3); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);">
      <label class="field">
        <span class="label">Transition Effect</span>
        <select id="in-transition-effect">
          <option value="" disabled hidden>Select transition...</option>
          <option value="none">None (instant)</option>
          <option value="grid-overlay" selected>Grid Overlay</option>
          <option value="bars-left">Bars from Left</option>
          <option value="bars-top">Bars from Top</option>
          <option value="curtain-close">Curtain Close</option>
          <option value="new-5">Pixel Pop</option>
          <option value="new-15">Slab Squash</option>
          <option value="new-18">Wave Bars</option>
          <option value="new-19">Radial Tiles</option>
          <option value="new-20">Zigzag Slats</option>
          <option value="n2-2">Spiral Tiles</option>
          <option value="n2-3">Diamond Burst</option>
          <option value="n2-6">Slot Drop</option>
          <option value="n2-7">Door Slide</option>
          <option value="n2-8">Vertical Blinds</option>
          <option value="n2-11">Triangle Wedges</option>
          <option value="n2-13">Quadrant Slam</option>
          <option value="n2-15">Checker Flash</option>
          <option value="n2-17">Snake Path</option>
        </select>
      </label>
    </div>
  </details>

  <div id="setup-pitch-controls" style="display: none;"></div>

  <div id="setup-career-controls" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 0;">
  </div>

  <div id="setup-shorts-circle-preview-field" class="field" style="display: none; flex-direction: column; gap: 0.55rem; background: rgba(0,0,0,0.25); padding: 0.75rem; border-radius: 6px; border: 1px solid rgba(255,202,40,0.25); margin-top: 0.65rem;">
    <label style="display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; cursor: pointer;">
      <span class="label" style="margin: 0; font-size: 0.78rem; color: #e2e8f0;">Test circles size (shorts)</span>
      <input type="checkbox" id="shorts-circle-preview-toggle" style="width: 1.15rem; height: 1.15rem; margin: 0; cursor: pointer; accent-color: var(--accent);" />
    </label>
    <label class="field" style="margin: 0; gap: 0.35rem;">
      <span class="label" style="margin: 0; font-size: 0.72rem; color: #94a3b8;">Number of circles (1–24)</span>
      <input type="number" id="shorts-circle-preview-count" value="5" min="1" max="24" step="1" style="width: 100%; padding: 0.35rem 0.5rem; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: #fff;" />
    </label>
    <p style="margin: 0; font-size: 0.65rem; line-height: 1.35; color: #64748b;">Turn on Shorts first. Layout + sizes follow <code style="font-size:0.9em;">shorts-career-club-count-map.css</code> (counts &gt; 12 reuse row logic + base styles).</p>
  </div>
</div>

<div id="panel-voice" class="panel-section">
  <div class="voice-tab-root">
    <div class="voice-tab-empty">Open the tab to load voice status…</div>
  </div>
</div>

<div id="panel-saved" class="panel-section">
  <div id="saved-scripts-list" class="rq-list"></div>
</div>

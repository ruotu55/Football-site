<div class="team-header" id="team-header" hidden>
  <div class="team-header-cluster team-header-logo-block" id="team-header-logo-block">
    <div class="team-header-logo-reveal-stack">
      <div class="team-header-controls-row" aria-label="Logo size and position">
        <div class="team-header-logo-zoom" aria-label="Logo size">
          <button type="button" id="team-header-zoom-out" class="team-header-zoom-btn" aria-label="Smaller logo">-</button>
          <button type="button" id="team-header-zoom-in" class="team-header-zoom-btn" aria-label="Larger logo">+</button>
        </div>
        <div class="team-header-logo-nudge" aria-label="Move logo horizontally">
          <button type="button" id="team-header-nudge-left" class="team-header-zoom-btn team-header-nudge-btn" aria-label="Move logo left">◀</button>
          <button type="button" id="team-header-nudge-right" class="team-header-zoom-btn team-header-nudge-btn" aria-label="Move logo right">▶</button>
        </div>
        <div class="team-header-logo-swap" aria-label="Pick crest from Other Teams">
          <button type="button" id="team-header-swap-logo" class="team-header-zoom-btn team-header-swap-logo-btn" hidden>Swap logo</button>
        </div>
      </div>
      <div class="team-header-main-row">
        <div class="team-header-title-cluster">
          <div class="team-header-logo-fly-group">
            <div class="team-header-logo-shift">
              <div class="team-header-logo-inner">
                <img id="team-header-logo" class="team-header-logo" src="" alt="Team logo or crest" hidden />
              </div>
            </div>
          </div>
          <h2 id="team-header-name" class="team-header-name"></h2>
        </div>
      </div>
    </div>
  </div>
</div>

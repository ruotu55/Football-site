<div class="panel-header">
  <h1>Quiz controls</h1>
  <button type="button" class="panel-toggle" id="panel-toggle" aria-expanded="true">Hide</button>
</div>

<div class="panel-tabs">
  <button type="button" class="tab-btn active" id="tab-btn-landing">Landing</button>
  <button type="button" class="tab-btn" id="tab-btn-setup">Setup</button>
  <button type="button" class="tab-btn" id="tab-btn-saved">Saved</button>
</div>

<div id="panel-landing" class="panel-section active">
  <label class="field">
    <span class="label">Quiz Sub-Type</span>
    <select id="in-quiz-type">
      <option value="nat-by-club">Guess the football national team name by players' club</option>
      <option value="club-by-nat">Guess the football team name by players' nationality</option>
    </select>
  </label>

  <button type="button" id="btn-save-current-team-landing" class="btn-save-current-team" hidden aria-pressed="false">
    Save current team
  </button>

  <label class="field" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;">
    <span class="label" style="margin: 0;">Add specific title</span>
    <input type="checkbox" id="in-specific-title-toggle" style="width: 1.2rem; height: 1.2rem; margin: 0; cursor: pointer; accent-color: var(--accent);" />
  </label>
  <div id="specific-title-settings" style="display: none; flex-direction: column; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 6px;">
    <label class="field">
      <span class="label">Text</span>
      <input type="text" id="in-specific-title-text" value="World Cup Edition" />
    </label>
    <label class="field">
      <span class="label">Icon</span>
      <select id="in-specific-title-icon">
        <optgroup label="Leagues">
          <option value="icons/specific-title/Premier League.png">Premier League</option>
          <option value="icons/specific-title/La Liga.png">La Liga</option>
          <option value="icons/specific-title/Seria A.png">Seria A</option>
          <option value="icons/specific-title/Bundesliga.png">Bundesliga</option>
          <option value="icons/specific-title/Ligue 1.png">Ligue 1</option>
        </optgroup>
        <optgroup label="Competitions">
          <option value="icons/specific-title/World Cup 2026.png" selected>World Cup 2026</option>
          <option value="icons/specific-title/Champions League.png">Champions League</option>
          <option value="icons/specific-title/Europa League.png">Europa League</option>
          <option value="icons/specific-title/Conference League.png">Conference League</option>
        </optgroup>
        <optgroup label="Emoji">
          <option value="🏆">🏆 Trophy</option>
          <option value="⚽">⚽ Soccer Ball</option>
          <option value="🌍">🌍 Earth</option>
          <option value="🔥">🔥 Fire</option>
          <option value="⭐">⭐ Star</option>
        </optgroup>
      </select>
    </label>
  </div>

  <label class="field" style="flex-direction: row; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;">
    <span class="label" style="margin: 0;">Shots size</span>
    <input type="checkbox" id="in-shots-size-toggle" style="width: 1.2rem; height: 1.2rem; margin: 0; cursor: pointer; accent-color: var(--accent);" />
  </label>

  <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <input type="number" id="in-easy" value="10" min="0" />
    <input type="number" id="in-medium" value="5" min="0" />
    <input type="number" id="in-hard" value="3" min="0" />
    <input type="number" id="in-impossible" value="1" min="0" />
  </div>
</div>

<div id="panel-setup" class="panel-section">
  <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <input type="checkbox" id="video-mode-toggle" />
    <input type="checkbox" id="shorts-mode-toggle" checked disabled />
  </div>
  <button type="button" id="apply-video-all-btn" class="panel-toggle" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">Apply Video Mode To All</button>

  <label class="field">
    <span class="label">Background Color</span>
    <select id="in-background-color"></select>
  </label>
  <label class="field">
    <span class="label">Background Effect</span>
    <select id="in-background-effect"></select>
  </label>
  <label class="field">
    <span class="label">Opacity</span>
    <input type="number" id="in-background-opacity" value="1" min="0" max="10" step="0.1" />
  </label>
  <button type="button" id="btn-save-background-opacity" class="panel-toggle">Save Opacity For Color</button>

  <label class="field">
    <span class="label">Total Levels</span>
    <div style="display: flex; gap: 0.5rem;">
      <input type="number" id="quiz-levels-input" value="4" min="1" max="100" style="flex: 1;" />
      <button type="button" id="update-levels-btn" class="panel-toggle">Apply</button>
    </div>
  </label>

  <button type="button" id="btn-levels-control" class="panel-toggle" style="width: 100%; margin-top: 0.5rem; background: rgba(255,255,255,0.05); color: var(--accent); font-weight: 800; border: 1px dashed var(--accent);">Levels Control</button>
  <div id="levels-reorder-list" style="display: none; flex-direction: column; gap: 0.4rem; margin-top: 0.8rem; padding: 0.6rem; background: rgba(0,0,0,0.3); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); max-height: 25rem; overflow-y: auto;"></div>

  <div id="setup-pitch-controls" style="display: flex; flex-direction: column; gap: 1rem;">
    <label class="field" style="display: none;">
      <span class="label">Squad type</span>
      <select id="squad-type">
        <option value="club">Club teams</option>
        <option value="national">National teams</option>
      </select>
    </label>

    <label class="field">
      <span class="label">Formation</span>
      <select id="formation"></select>
    </label>

    <button type="button" id="btn-save-current-team" class="btn-save-current-team" hidden>
      Save current team
    </button>

    <label class="field" style="display: none;">
      <span class="label">Images type</span>
      <select id="display-mode">
        <option value="club">Club photos</option>
        <option value="country">National team photos</option>
      </select>
    </label>
  </div>
</div>

<div id="panel-saved" class="panel-section">
  <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
    <button type="button" class="panel-toggle" id="btn-save-script" style="flex: 2; padding: 0.8rem; background: var(--accent); color: #000; font-weight: bold;">Save Current Settings</button>
    <button type="button" class="panel-toggle" id="btn-create-folder" style="flex: 1; padding: 0.8rem; font-weight: bold; background: rgba(255,255,255,0.1); color: #fff;">+ Folder</button>
  </div>
  <div id="saved-scripts-list" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
</div>

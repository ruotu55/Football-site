<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Football Quiz Studio - Player stats - Regular</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      
      <div id="floating-background" class="floating-background" aria-hidden="true"></div>

      <div class="side-text left">THE FOOTBALL LAB</div>
      <div class="side-text right" id="side-text-right">THE FOOTBALL LAB</div>

      <button type="button" class="panel-fab" id="panel-fab">Show controls</button>
      <button type="button" class="panel-fab video-mode-btn" id="video-mode-btn" aria-pressed="false">Video Mode</button>
            <button type="button" class="panel-fab play-video-btn" id="play-video-btn">Play Video</button>
      
      <div id="countdown-timer" class="countdown-timer" hidden>
        <svg class="timer-svg" viewBox="0 0 100 100">
          <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
        </svg>
        <span id="countdown-text">3</span>
      </div>
      
      <aside class="control-panel" id="control-panel"></aside>
      <aside class="control-panel right-panel" id="right-panel" hidden></aside>

      <main class="stage">
        <div id="stage-main" class="stage-main">
            </div>
        <div class="quiz-progress" id="quiz-progress-container"></div>
      </main>

      <div id="modal-container"></div>

      <!-- Floating shirt with per-level editable number -->
      <div class="landing-shirt" id="landing-shirt" hidden>
        <svg viewBox="0 0 200 180" class="landing-shirt__svg" xmlns="http://www.w3.org/2000/svg">
          <!-- Shirt body -->
          <path d="
            M 70 6
            C 65 8 55 14 42 22
            C 28 31 14 44 6 58
            C 4 62 3 66 4 68
            L 28 80
            C 30 81 32 80 33 78
            C 38 70 42 64 46 60
            C 48 58 50 59 50 62
            L 50 166
            C 50 170 53 172 56 172
            L 144 172
            C 147 172 150 170 150 166
            L 150 62
            C 150 59 152 58 154 60
            C 158 64 162 70 167 78
            C 168 80 170 81 172 80
            L 196 68
            C 197 66 196 62 194 58
            C 186 44 172 31 158 22
            C 145 14 135 8 130 6
            C 126 16 118 24 100 24
            C 82 24 74 16 70 6
            Z
          " class="landing-shirt__body"/>
          <!-- Collar trim -->
          <path d="M 70 6 C 74 16 82 24 100 24 C 118 24 126 16 130 6" fill="none" class="landing-shirt__trim" stroke-width="3.5"/>
          <!-- Left sleeve trim -->
          <path d="M 6 58 C 4 62 3 66 4 68 L 28 80" fill="none" class="landing-shirt__trim" stroke-width="3.5"/>
          <!-- Right sleeve trim -->
          <path d="M 194 58 C 196 62 197 66 196 68 L 172 80" fill="none" class="landing-shirt__trim" stroke-width="3.5"/>
        </svg>
        <span class="landing-shirt__number" id="landing-shirt-number">?</span>
      </div>

    </div>

    <script type="module">
      async function loadComponent(url, elementId, isReplace = false) {
        try {
          const response = await fetch(url);
          const html = await response.text();
          const target = document.getElementById(elementId);
          if (isReplace) {
            target.innerHTML = html;
          } else {
            target.insertAdjacentHTML('beforeend', html);
          }
        } catch (err) {
          console.error(`Failed to load ${url}:`, err);
        }
      }

      async function init() {
        await Promise.all([
          loadComponent('html/controls.html', 'control-panel', true),
          loadComponent('html/progress.html', 'quiz-progress-container', true),
          loadComponent('html/modals.html', 'modal-container', true)
        ]);

        const stageComponents = [
          'html/logo.html',
          'html/landing.html',
          'html/outro.html',
          'html/header.html',
          'html/career.html'
        ];

        for (const url of stageComponents) {
          await loadComponent(url, 'stage-main');
        }

        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'js/app.js';
        document.body.appendChild(script);
      }

      init();
    </script>
  </body>
</html>

<!DOCTYPE html>
<!-- Run (no browser, PowerShell): & "C:\Users\Rom\Desktop\‏‏תיקיה חדשה\Football Channel\Main Runner - Career Path - Regular\run_site.bat" --no-browser -->
<!-- macOS/Linux: python3 "C:/Users/Rom/Desktop/‏‏תיקיה חדשה/Football Channel/Main Runner - Career Path - Regular/run_site.py" -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Football Quiz Studio - Player stats - Regular</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Shirt numerals: own request so Play 700 wins over body UI font (subset = small file). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Play:wght@700&display=swap&text=0123456789%3F"
    />
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      
      <div id="floating-background" class="floating-background" aria-hidden="true"></div>

      <div class="side-text left" id="side-text-left">THE FOOTBALL LAB</div>
      <div class="side-text right" id="side-text-right">THE FOOTBALL LAB</div>

      <button type="button" class="panel-fab" id="panel-fab">Show controls</button>
      <button type="button" class="panel-fab video-mode-btn" id="video-mode-btn" aria-pressed="false">Video Mode</button>
            <button type="button" class="panel-fab prod-btn" id="prod-btn" aria-pressed="false">PROD</button>
            <button type="button" class="panel-fab play-video-btn" id="play-video-btn">Play Video</button>
      
      <div id="countdown-timer" class="countdown-timer" hidden>
        <svg class="timer-svg" viewBox="0 0 100 100">
          <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
        </svg>
        <span id="countdown-text">3</span>
      </div>
      
      <aside class="control-panel" id="control-panel"></aside>
      <aside class="control-panel right-panel" id="right-panel" hidden></aside>

      <!-- Same slot as Shorts / Four params: outside `.stage` so fixed clear / Get photo / Switch use the viewport column. -->
      <div id="player-voice-chrome-mount" class="shorts-chrome-mount"></div>

      <!-- Ball-drop preloader (shown after Play Video on landing) -->
      <div id="ball-preloader" class="ball-preloader" hidden>
        <div class="ball-layer ball-layer-2"></div>
        <div class="ball-layer ball-layer-1"></div>
        <div class="ball-preloader-ball">
          <div class="ball-preloader-ball-scale">
            <div class="ball">
              <div class="ball-sphera">
                <div class="ball-sphera__patch-top"><div class="line"></div></div>
                <div class="ball-sphera__patch-middle--left"><div class="line"></div></div>
                <div class="ball-sphera__patch-middle--right"><div class="line"></div></div>
                <div class="ball-sphera__patch-center"></div>
                <div class="ball-sphera__patch-bottom--left"><div class="line"></div></div>
                <div class="ball-sphera__patch-bottom--right"><div class="line"></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <main class="stage">
        <div id="stage-main" class="stage-main">
            </div>
        <div class="quiz-progress" id="quiz-progress-container"></div>
      </main>

      <div id="modal-container"></div>

      <!-- Floating shirt with per-level editable number (photo tee; no name) -->
      <div class="landing-shirt" id="landing-shirt" hidden>
        <img
          class="landing-shirt__img"
          src="https://i.ibb.co/LdRC1wS8/blank-t-shirt.png"
          alt=""
        />
        <span class="landing-shirt__number play-bold" id="landing-shirt-number">?</span>
      </div>

    </div>

    <script type="module">
      async function loadComponent(url, elementId, isReplace = false) {
        try {
          const response = await fetch(url);
          const html = await response.text();
          const target = document.getElementById(elementId);
          if (isReplace) {
            target.innerHTML = html;
          } else {
            target.insertAdjacentHTML('beforeend', html);
          }
        } catch (err) {
          console.error(`Failed to load ${url}:`, err);
        }
      }

      async function init() {
        await Promise.all([
          loadComponent('html/controls.html', 'control-panel', true),
          loadComponent('html/progress.html', 'quiz-progress-container', true),
          loadComponent('html/modals.html', 'modal-container', true)
        ]);

        const stageComponents = [
          'html/logo.html',
          'html/landing.html',
          'html/outro.html',
          'html/header.html',
          'html/career.html'
        ];

        for (const url of stageComponents) {
          await loadComponent(url, 'stage-main');
        }

        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'js/app.js';
        document.body.appendChild(script);
      }

      init();
    </script>
  </body>
</html>

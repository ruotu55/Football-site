<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Channel · Upload Calendar</title>
  <link rel="stylesheet" href="css/styles.css?v=20260601-thumbnail">
</head>
<body>
  <section class="controls">
    <div class="nav">
      <button id="prev-month" class="navbtn">&lsaquo;</button>
      <h2 id="current-month"></h2>
      <button id="next-month" class="navbtn">&rsaquo;</button>
      <button id="today-btn" class="navbtn today-btn">Today</button>
    </div>

    <div class="channel-switch" role="tablist">
      <button class="switch-btn switch-en active" data-channel="en" role="tab" aria-selected="true">English</button>
      <button class="switch-btn switch-es" data-channel="es" role="tab" aria-selected="false">Español</button>
    </div>

    <div class="filters">
      <label class="chip chip-long"><input type="checkbox" data-filter="long" checked> Long</label>
      <label class="chip chip-short"><input type="checkbox" data-filter="short" checked> Shorts</label>
      <button type="button" id="open-remote" class="open-remote-btn"
        title="Copy the LAN link to open this calendar on another device on the same network (e.g. your recording Mac)">Open Remote</button>
    </div>
  </section>

  <main id="calendar" class="calendar"></main>

  <div id="url-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-labelledby="url-modal-title">
      <h3 id="url-modal-title">Mark as uploaded</h3>
      <p id="url-modal-meta" class="modal-meta"></p>
      <label class="modal-label" for="url-input">YouTube video URL</label>
      <input type="url" id="url-input" class="modal-input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
      <div class="modal-actions">
        <button type="button" id="url-cancel" class="navbtn">Cancel</button>
        <button type="button" id="url-save" class="navbtn modal-save">Save</button>
      </div>
      <button type="button" id="url-clear" class="modal-clear" hidden>Remove link</button>
    </div>
  </div>

  <script src="js/schedule.js?v=20260601-noconsec"></script>
  <script src="js/upload-status.js?v=37"></script>
  <script src="js/recording-status-client.js?v=20260601-noconsec"></script>
  <script src="js/youtube-upload-client.js?v=38-thumb"></script>
  <script src="js/calendar.js?v=20260601-thumbnail"></script>
</body>
</html>
